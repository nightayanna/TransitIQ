<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JaTravelSafe — Jamaica Safety Navigator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#07090f;--bg2:#0d1220;--bg3:#111828;
    --border:rgba(255,255,255,0.07);
    --text:#dde6f4;--muted:#4a5870;--accent:#3dd68c;
    --low:#3dd68c;--med:#f5c030;--high:#ff8030;--crit:#ff3838;
    --fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--fm:'DM Mono',monospace;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fb);font-size:14px}

  /* ─── LAYOUT ─── */
  #app{display:grid;grid-template-rows:56px 1fr;height:100vh;min-height:600px}
  #main{display:grid;grid-template-columns:1fr 330px;overflow:hidden}

  /* ─── HEADER ─── */
  #hdr{
    background:var(--bg2);border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;padding:0 18px;gap:14px
  }
  .logo{display:flex;align-items:center;gap:9px}
  .pulse{width:9px;height:9px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(61,214,140,.5)}70%{box-shadow:0 0 0 8px rgba(61,214,140,0)}100%{box-shadow:0 0 0 0 rgba(61,214,140,0)}}
  .logo-name{font-family:var(--fh);font-size:15px;font-weight:800;color:var(--accent);letter-spacing:.5px}
  .logo-sub{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
  .hdr-search{
    display:flex;align-items:center;gap:7px;
    background:rgba(255,255,255,.04);border:1px solid var(--border);
    border-radius:22px;padding:5px 13px;flex:1;max-width:300px
  }
  .hdr-search input{background:none;border:none;outline:none;color:var(--text);font-size:12px;font-family:var(--fb);width:100%}
  .hdr-search input::placeholder{color:var(--muted)}
  .hdr-pills{display:flex;gap:6px}
  .hpill{
    display:flex;align-items:center;gap:5px;
    font-size:10px;font-family:var(--fm);color:var(--muted);
    background:rgba(255,255,255,.04);border:1px solid var(--border);
    border-radius:6px;padding:3px 8px
  }
  .hpill-dot{width:5px;height:5px;border-radius:50%}

  /* ─── MAP ─── */
  #map-wrap{position:relative;overflow:hidden}
  #map{width:100%;height:100%}

  /* Layer toggle */
  .layer-bar{
    position:absolute;top:12px;left:12px;
    display:flex;gap:5px;z-index:10
  }
  .lbtn{
    background:rgba(7,9,15,.88);border:1px solid rgba(255,255,255,.14);
    border-radius:6px;padding:5px 9px;font-size:10px;
    font-family:var(--fm);color:var(--muted);cursor:pointer;transition:all .15s
  }
  .lbtn:hover,.lbtn.on{background:var(--accent);color:#042C53;border-color:var(--accent)}

  /* Aerial panel */
  #av-panel{
    position:absolute;bottom:16px;left:16px;
    width:296px;height:186px;
    background:var(--bg2);border:1px solid var(--border);
    border-radius:12px;overflow:hidden;z-index:20;
    display:none;flex-direction:column;
    box-shadow:0 8px 32px rgba(0,0,0,.55)
  }
  #av-panel.show{display:flex}
  #av-hdr{
    display:flex;align-items:center;justify-content:space-between;
    padding:7px 11px;background:rgba(0,0,0,.4);border-bottom:1px solid var(--border);flex-shrink:0
  }
  .av-label{font-size:9px;font-family:var(--fm);color:var(--accent);letter-spacing:1px;text-transform:uppercase}
  .av-loc{font-size:11px;color:var(--text);font-weight:500}
  #av-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0 2px;transition:color .15s}
  #av-close:hover{color:var(--text)}
  #av-body{flex:1;position:relative;background:#060a12;display:flex;align-items:center;justify-content:center}
  #av-video{width:100%;height:100%;object-fit:cover;cursor:pointer;display:none}
  .av-spin{
    width:20px;height:20px;border:2px solid rgba(61,214,140,.2);
    border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .av-spin-label{font-size:10px;color:var(--muted);font-family:var(--fm);margin-top:6px}
  #av-err{
    position:absolute;inset:0;display:none;flex-direction:column;
    align-items:center;justify-content:center;gap:5px;
    background:#060a12;padding:10px;text-align:center
  }
  #av-err.show{display:flex}
  .av-err-txt{font-size:10px;color:var(--muted);line-height:1.6}

  /* ─── SIDEBAR ─── */
  #sb{background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}

  /* Tab bar */
  #tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
  .tab{
    flex:1;padding:9px 4px;font-size:10px;font-family:var(--fm);
    text-align:center;text-transform:uppercase;letter-spacing:.8px;
    color:var(--muted);cursor:pointer;border:none;background:none;
    border-bottom:2px solid transparent;transition:all .15s
  }
  .tab.on{color:var(--accent);border-bottom-color:var(--accent)}

  /* Detail */
  #detail{padding:14px;border-bottom:1px solid var(--border);flex-shrink:0}
  .dname{font-family:var(--fh);font-size:16px;font-weight:700;color:var(--text);margin-bottom:2px}
  .dtype{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .type-icon{font-size:12px}
  .rbadge{
    display:inline-flex;align-items:center;gap:5px;
    padding:3px 10px;border-radius:20px;font-size:10px;
    font-family:var(--fm);font-weight:500;letter-spacing:.4px;
    margin-bottom:10px;text-transform:uppercase
  }
  .rdot{width:5px;height:5px;border-radius:50%}
  .grow{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px}
  .gpct{font-family:var(--fm)}
  .gtrack{height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;margin-bottom:10px}
  .gfill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
  .sgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
  .sc{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:7px;padding:6px 9px}
  .sl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
  .sv{font-size:12px;font-weight:500;color:#b8c4d8;font-family:var(--fm)}
  .th{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
  .ti{display:flex;gap:6px;font-size:11px;color:#7a8fa8;line-height:1.6;margin-bottom:3px}
  .ta{color:var(--accent);flex-shrink:0}
  .av-btn{
    display:flex;align-items:center;gap:7px;margin-top:8px;
    background:rgba(61,214,140,.08);border:1px solid rgba(61,214,140,.25);
    border-radius:7px;padding:7px 11px;cursor:pointer;transition:all .15s;
    width:100%;font-size:11px;color:var(--accent);font-family:var(--fb)
  }
  .av-btn:hover{background:rgba(61,214,140,.15);border-color:rgba(61,214,140,.5)}
  .hint{font-size:12px;color:var(--muted);text-align:center;padding:18px 10px;line-height:1.8}

  /* Lists */
  .scroll-list{flex:1;overflow-y:auto}
  .scroll-list::-webkit-scrollbar{width:3px}
  .scroll-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
  .li{display:flex;align-items:center;gap:9px;padding:6px 14px;cursor:pointer;transition:background .12s}
  .li:hover,.li.on{background:rgba(255,255,255,.05)}
  .li-icon{font-size:12px;flex-shrink:0;width:16px;text-align:center}
  .li-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .li-name{font-size:12px;color:#b8c4d8;flex:1}
  .li-sub{font-size:10px;color:var(--muted)}
  .li-pct{font-size:11px;font-family:var(--fm)}

  /* Section headers in list */
  .list-section-hdr{
    padding:8px 14px 4px;
    font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;
    font-family:var(--fm);border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:6px
  }

  /* Legend */
  #legend{padding:9px 14px;border-top:1px solid var(--border);flex-shrink:0}
  .lbar{height:4px;border-radius:2px;background:linear-gradient(to right,var(--low),var(--med),var(--high),var(--crit));margin-bottom:4px}
  .llabels{display:flex;justify-content:space-between;font-size:9px;font-family:var(--fm)}

  /* Transport hub markers */
  .hub-iw{
    background:#0d1220;border-radius:10px;padding:12px 14px;
    min-width:180px;font-family:'DM Sans',sans-serif;color:#dde6f4
  }
  .hub-iw-type{font-size:9px;color:#4a5870;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px}
  .hub-iw-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:6px}
  .hub-iw-row{font-size:11px;color:#7a8fa8;line-height:1.7}
</style>
</head>
<body>
<div id="app">

<!-- HEADER -->
<div id="hdr">
  <div class="logo">
    <div class="pulse"></div>
    <div>
      <div class="logo-name">JaTravelSafe</div>
      <div class="logo-sub">Jamaica Safety Navigator</div>
    </div>
  </div>
  <div class="hdr-search">
    <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="#4a5870" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="#4a5870" stroke-width="1.5" stroke-linecap="round"/></svg>
    <input type="text" placeholder="Search communities, hubs..." oninput="filterAll(this.value)"/>
  </div>
  <div class="hdr-pills">
    <div class="hpill"><div class="hpill-dot" id="dot-maps" style="background:#4a5870"></div><span id="lbl-maps">Maps API</span></div>
    <div class="hpill"><div class="hpill-dot" id="dot-av" style="background:#4a5870"></div><span id="lbl-av">Aerial View</span></div>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- MAP -->
  <div id="map-wrap">
    <div id="map"></div>
    <div class="layer-bar">
      <button class="lbtn on"  id="btn-road"      onclick="setType('roadmap')">Road</button>
      <button class="lbtn"     id="btn-satellite" onclick="setType('satellite')">Satellite</button>
      <button class="lbtn"     id="btn-hybrid"    onclick="setType('hybrid')">Hybrid</button>
      <button class="lbtn on"  id="btn-comm"      onclick="toggleLayer('comm')">Communities</button>
      <button class="lbtn on"  id="btn-hubs"      onclick="toggleLayer('hubs')">Transport Hubs</button>
    </div>

    <!-- Aerial View Panel -->
    <div id="av-panel">
      <div id="av-hdr">
        <div><div class="av-label">Aerial View</div><div class="av-loc" id="av-loc-lbl">—</div></div>
        <button id="av-close" onclick="closeAV()">✕</button>
      </div>
      <div id="av-body">
        <video id="av-video" muted autoplay loop playsinline></video>
        <div id="av-loading" style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div class="av-spin"></div>
          <div class="av-spin-label">Loading aerial footage...</div>
        </div>
        <div id="av-err"><div class="av-err-txt" id="av-err-txt">No aerial footage for this location.</div></div>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div id="sb">
    <div id="tabs">
      <button class="tab on"  id="tab-detail"    onclick="showTab('detail')">Info</button>
      <button class="tab"     id="tab-comm"      onclick="showTab('comm')">Communities</button>
      <button class="tab"     id="tab-hubs"      onclick="showTab('hubs')">Transport</button>
    </div>

    <!-- INFO TAB -->
    <div id="pane-detail">
      <div id="detail">
        <div id="detail-inner">
          <div class="hint">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" style="display:block;margin:0 auto 10px">
              <circle cx="12" cy="12" r="10" stroke="#2a3a4a" stroke-width="1.5"/>
              <path d="M12 8v4M12 16h.01" stroke="#3a4a5a" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Tap any danger community or transport hub on the map to see real-time safety info and aerial footage.
          </div>
        </div>
      </div>
    </div>

    <!-- COMMUNITIES TAB -->
    <div id="pane-comm" style="display:none;flex:1;overflow:hidden;flex-direction:column">
      <div id="comm-list" class="scroll-list"></div>
    </div>

    <!-- TRANSPORT HUBS TAB -->
    <div id="pane-hubs" style="display:none;flex:1;overflow:hidden;flex-direction:column">
      <div id="hub-list" class="scroll-list"></div>
    </div>

    <div id="legend">
      <div class="lbar"></div>
      <div class="llabels">
        <span style="color:var(--low)">Low</span>
        <span style="color:var(--med)">Moderate</span>
        <span style="color:var(--high)">High</span>
        <span style="color:var(--crit)">Critical</span>
      </div>
    </div>
  </div>
</div>
</div>

<script>

/* ════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════ */
function dCol(d){
  if(d<40) return '#3dd68c';
  if(d<60) return '#f5c030';
  if(d<75) return '#ff8030';
  return '#ff3838';
}
function rLvl(d){
  if(d<40) return {l:'Low risk',      bg:'rgba(61,214,140,.12)', c:'#3dd68c'};
  if(d<60) return {l:'Moderate risk', bg:'rgba(245,192,48,.12)', c:'#f5c030'};
  if(d<75) return {l:'High risk',     bg:'rgba(255,128,48,.12)', c:'#ff8030'};
  return         {l:'Critical risk', bg:'rgba(255,56,56,.12)',  c:'#ff3838'};
}
function hubIcon(type){
  return {airport:'✈',port:'⚓',bus:'🚌',road:'🛣'}[type]||'📍';
}

/* ════════════════════════════════════════════
   SELECT + RENDER DETAIL
════════════════════════════════════════════ */
function selectItem(id, dataType){
  selId=id;
  const item = dataType==='comm'
    ? COMMUNITIES.find(x=>x.id===id)
    : HUBS.find(x=>x.id===id);
  if(!item) return;

  document.querySelectorAll('.li').forEach(el=>el.classList.remove('on'));
  const li=document.querySelector(`.li[data-id="${id}"]`);
  if(li){li.classList.add('on');li.scrollIntoView({block:'nearest'});}

  showTab('detail');
  renderDetail(item, dataType);
  if(gMap) gMap.panTo({lat:item.lat,lng:item.lng});
}

function renderDetail(item, dataType){
  const lv=rLvl(item.danger), c=dCol(item.danger);
  const isHub = dataType==='hub';
  const typeLabel = isHub
    ? (hubIcon(item.type)+' '+item.type.charAt(0).toUpperCase()+item.type.slice(1)+' Hub')
    : '⚠ Danger Community';
  const bodyText = isHub ? item.safety : item.desc;
  const tips = item.tips||[];
  const extra = isHub && item.services && item.services.length
    ? `<div class="th" style="margin-top:2px">Services</div>${item.services.map(s=>`<div class="ti"><span class="ta">›</span><span>${s}</span></div>`).join('')}`
    : '';

  document.getElementById('detail-inner').innerHTML=`
    <div class="dname">${item.name}</div>
    <div class="dtype"><span class="type-icon">${typeLabel}</span> · ${item.area}</div>
    <div class="rbadge" style="background:${lv.bg};color:${lv.c}">
      <div class="rdot" style="background:${lv.c}"></div>${lv.l}
    </div>
    <div class="grow"><span>Danger index</span><span class="gpct" style="color:${c}">${item.danger}%</span></div>
    <div class="gtrack"><div class="gfill" style="width:${item.danger}%;background:${c}"></div></div>
    <div class="sgrid">
      <div class="sc"><div class="sl">Area</div><div class="sv" style="font-size:11px">${item.area}</div></div>
      <div class="sc"><div class="sl">Parish</div><div class="sv" style="font-size:11px">${item.parish}</div></div>
    </div>
    <div class="th">Overview</div>
    <div style="font-size:11px;color:#7a8fa8;line-height:1.65;margin-bottom:10px">${bodyText}</div>
    <div class="th">Safety tips</div>
    ${tips.map(t=>`<div class="ti"><span class="ta">›</span><span>${t}</span></div>`).join('')}
    ${extra}
    <button class="av-btn" onclick="loadAV('${item.id}','${dataType}')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="#3dd68c" stroke-width="1.5"/><circle cx="12" cy="9" r="2.5" stroke="#3dd68c" stroke-width="1.5"/></svg>
      View aerial footage — ${item.name}
    </button>
  `;
}

/* ════════════════════════════════════════════
   AERIAL VIEW
════════════════════════════════════════════ */
async function loadAV(id, dataType){
  const item = dataType==='comm'
    ? COMMUNITIES.find(x=>x.id===id)
    : HUBS.find(x=>x.id===id);
  if(!item) return;
  const query = item.aerialQ||item.name+', Jamaica';

  const panel=document.getElementById('av-panel');
  const video=document.getElementById('av-video');
  const loading=document.getElementById('av-loading');
  const err=document.getElementById('av-err');

  panel.classList.add('show');
  document.getElementById('av-loc-lbl').textContent=item.name;
  loading.style.display='flex';
  err.classList.remove('show');
  video.style.display='none';
  video.src='';

  try{
    const p=new URLSearchParams();
    p.set('address',query);
    p.set('key',KEY);
    const res=await fetch(`https://aerialview.googleapis.com/v1/videos:lookupVideo?${p}`);
    const d=await res.json();
    loading.style.display='none';
    if(d.state==='PROCESSING'){
      document.getElementById('av-err-txt').textContent='Aerial footage is still processing — try again shortly.';
      err.classList.add('show');
    } else if(d.error||!d.uris){
      document.getElementById('av-err-txt').textContent='No aerial footage available for this location yet.';
      err.classList.add('show');
    } else {
      const uri=d.uris.MP4_MEDIUM?.landscapeUri||d.uris.MP4_HIGH?.landscapeUri;
      if(uri){video.src=uri;video.style.display='block';video.play();}
      else{document.getElementById('av-err-txt').textContent='Video format unavailable.';err.classList.add('show');}
    }
  }catch(e){
    loading.style.display='none';
    document.getElementById('av-err-txt').textContent='Network error loading aerial footage.';
    err.classList.add('show');
  }
}
function closeAV(){
  document.getElementById('av-panel').classList.remove('show');
  const v=document.getElementById('av-video');v.pause();v.src='';
}

/* ════════════════════════════════════════════
   LAYER TOGGLES
════════════════════════════════════════════ */
function toggleLayer(layer){
  if(layer==='comm'){
    commVisible=!commVisible;
    commMarkers.forEach(m=>m.setMap(commVisible?gMap:null));
    document.getElementById('btn-comm').classList.toggle('on',commVisible);
  } else {
    hubVisible=!hubVisible;
    hubMarkers.forEach(m=>m.setMap(hubVisible?gMap:null));
    document.getElementById('btn-hubs').classList.toggle('on',hubVisible);
  }
}
function setType(t){
  if(!gMap) return;
  gMap.setMapTypeId(t);
  ['road','satellite','hybrid'].forEach(b=>{
    document.getElementById('btn-'+b).classList.remove('on');
  });
  document.getElementById('btn-'+t.replace('roadmap','road')).classList.add('on');
}

/* ════════════════════════════════════════════
   TABS
════════════════════════════════════════════ */
function showTab(t){
  ['detail','comm','hubs'].forEach(id=>{
    document.getElementById('tab-'+id).classList.remove('on');
    document.getElementById('pane-'+id).style.display='none';
  });
  document.getElementById('tab-'+t).classList.add('on');
  document.getElementById('pane-'+t).style.display= t==='detail' ? 'block' : 'flex';
}

/* ════════════════════════════════════════════
   BUILD SIDEBAR LISTS
════════════════════════════════════════════ */
function buildCommList(filter=''){
  const el=document.getElementById('comm-list');
  el.innerHTML='';

  const groups={
    'Kingston / St. Andrew': COMMUNITIES.filter(c=>['Kingston','St. Andrew'].includes(c.parish)),
    'Montego Bay / St. James': COMMUNITIES.filter(c=>c.parish==='St. James'),
    'St. Catherine': COMMUNITIES.filter(c=>c.parish==='St. Catherine'),
    'Other Parishes': COMMUNITIES.filter(c=>!['Kingston','St. Andrew','St. James','St. Catherine'].includes(c.parish)),
  };

  Object.entries(groups).forEach(([gname, items])=>{
    const filtered = items.filter(c=>c.name.toLowerCase().includes(filter.toLowerCase())||c.area.toLowerCase().includes(filter.toLowerCase()));
    if(!filtered.length) return;
    const hdr=document.createElement('div');
    hdr.className='list-section-hdr';
    hdr.innerHTML=`<span>${gname}</span><span style="color:var(--crit);margin-left:auto">${filtered.length}</span>`;
    el.appendChild(hdr);
    filtered.sort((a,b)=>b.danger-a.danger).forEach(c=>{
      const col=dCol(c.danger);
      const d=document.createElement('div');
      d.className='li'+(selId===c.id?' on':'');
      d.setAttribute('data-id',c.id);
      d.onclick=()=>{ selectItem(c.id,'comm'); if(gMap) openCommIW(c,{lat:c.lat,lng:c.lng}); };
      d.innerHTML=`<div class="li-dot" style="background:${col}"></div>
        <div style="flex:1"><div class="li-name">${c.name}</div><div class="li-sub">${c.area}</div></div>
        <div class="li-pct" style="color:${col}">${c.danger}%</div>`;
      el.appendChild(d);
    });
  });
}

function buildHubList(filter=''){
  const el=document.getElementById('hub-list');
  el.innerHTML='';

  const groups={
    'Airports': HUBS.filter(h=>h.type==='airport'),
    'Cruise Ports': HUBS.filter(h=>h.type==='port'),
    'Bus Terminals': HUBS.filter(h=>h.type==='bus'),
    'Road Corridors': HUBS.filter(h=>h.type==='road'),
  };

  Object.entries(groups).forEach(([gname, items])=>{
    const filtered=items.filter(h=>h.name.toLowerCase().includes(filter.toLowerCase())||h.area.toLowerCase().includes(filter.toLowerCase()));
    if(!filtered.length) return;
    const hdr=document.createElement('div');
    hdr.className='list-section-hdr';
    hdr.innerHTML=`<span>${hubIcon(items[0].type)} ${gname}</span>`;
    el.appendChild(hdr);
    filtered.sort((a,b)=>b.danger-a.danger).forEach(h=>{
      const col=dCol(h.danger);
      const d=document.createElement('div');
      d.className='li'+(selId===h.id?' on':'');
      d.setAttribute('data-id',h.id);
      d.onclick=()=>{ selectItem(h.id,'hub'); if(gMap) openHubIW(h,{lat:h.lat,lng:h.lng}); };
      d.innerHTML=`<div class="li-icon">${hubIcon(h.type)}</div>
        <div style="flex:1"><div class="li-name">${h.name}</div><div class="li-sub">${h.area}</div></div>
        <div class="li-pct" style="color:${col}">${h.danger}%</div>`;
      el.appendChild(d);
    });
  });
}

function filterAll(q){
  buildCommList(q);
  buildHubList(q);
}
